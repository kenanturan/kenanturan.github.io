<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifika Oluşturucu (Yönetici Paneli)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Michroma&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f1115; color: #e2e4e9; font-family: 'Inter', sans-serif; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: #1a1d23; padding: 30px; border-radius: 8px; border: 1px solid #c5a059; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #c5a059; font-family: 'Michroma', sans-serif; font-size: 1.5rem; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 15px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #9ca3af; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; background: #0f1115; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #c5a059; }
        .btn { background: #c5a059; color: #000; padding: 12px 20px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; transition: 0.3s; }
        .btn:hover { background: #dec085; }
        .result-box { margin-top: 30px; padding: 20px; background: #000; border: 1px dashed #c5a059; border-radius: 4px; display: none; }
        .result-title { color: #c5a059; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
        textarea { width: 100%; height: 100px; background: #1a1d23; color: #a3e635; border: 1px solid #333; padding: 10px; font-family: monospace; resize: vertical; box-sizing: border-box; }
        .url-box { padding: 10px; background: #1a1d23; color: #60a5fa; margin-top: 10px; word-break: break-all; border: 1px solid #333; font-family: monospace; }
        .warning { color: #fbbf24; font-size: 0.85rem; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sertifika Oluşturucu (Kriptolu)</h1>
        
        <div class="form-group">
            <label>Kursiyer Adı (Maskeli Örn: K**** T****)</label>
            <input type="text" id="traineeName" placeholder="örn. A** Y*****" required>
        </div>
        
        <div class="form-group">
            <label>Kurs Adı</label>
            <input type="text" id="courseName" placeholder="örn. İleri Düzey Tesis Güvenliği" required>
        </div>

        <div class="form-group">
            <label>Sertifika Numarası (Benzersiz)</label>
            <input type="text" id="certId" placeholder="örn. TA-2026-001" required>
        </div>
        
        <div class="form-group">
            <label>Mezuniyet Tarihi</label>
            <input type="date" id="certDate" required>
        </div>

        <button class="btn" onclick="generate()">Şifreli Kodu ve QR Linkini Üret</button>
        
        <div class="result-box" id="resultBlock">
            <div class="result-title">1. JSON Dosyasına Yapıştırılacak Kod:</div>
            <textarea id="jsonOutput" readonly></textarea>
            
            <div class="result-title" style="margin-top:20px;">2. QR Kod için (veya kursiyere verilecek) Doğrulama Linki:</div>
            <div class="url-box" id="urlOutput"></div>
        </div>

        <div class="warning">
            DİKKAT: Bu sayfa gizlidir ve internete açık yerlere linkini koymayınız. Şifreleme tarayıcınızda lokal olarak yapılır.
        </div>
    </div>

    <script>
        // Set today's date automatically
        document.getElementById('certDate').valueAsDate = new Date();

        async function hashString(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function deriveKey(password) {
            const enc = new TextEncoder();
            const passHash = await crypto.subtle.digest('SHA-256', enc.encode(password));
            return await crypto.subtle.importKey("raw", passHash, {name: "AES-GCM"}, false, ["encrypt", "decrypt"]);
        }

        async function encryptData(secretData, password) {
            const key = await deriveKey(password);
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const enc = new TextEncoder();
            const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(JSON.stringify(secretData)));

            const ivHex = Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join('');
            const encHex = Array.from(new Uint8Array(encrypted)).map(b => b.toString(16).padStart(2, '0')).join('');
            return `${ivHex}.${encHex}`;
        }

        async function generate() {
            const certId = document.getElementById('certId').value.trim();
            const name = document.getElementById('traineeName').value.trim();
            const course = document.getElementById('courseName').value.trim();
            const date = document.getElementById('certDate').value;
            
            if (!certId || !name || !course) {
                alert("Lütfen tüm alanları doldurun.");
                return;
            }

            // Generate SHA-256 Hash of the Certificate ID (For lookup key)
            const hashedId = await hashString(certId);

            // Encrypt the payload (For zero-knowledge database)
            const payload = { name: name, course: course, date: date };
            const encryptedPayload = await encryptData(payload, certId);

            // Create JSON snippet
            const jsonSnippet = `"${hashedId}": "${encryptedPayload}",`;
            
            // Create URL (Hardcoded to production domain so it works even if admin tool is run locally)
            const domain = "https://www.taktikegitimakademisi.com";
            const verifyUrl = `${domain}/sertifika-sorgula.html?id=${encodeURIComponent(certId)}`;

            // Display results
            document.getElementById('jsonOutput').value = jsonSnippet;
            document.getElementById('urlOutput').innerText = verifyUrl;
            document.getElementById('resultBlock').style.display = 'block';
        }
    </script>
</body>
</html>
